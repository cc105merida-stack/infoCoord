<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Coordinador - Ventas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .header h1 {
            font-size: 24px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logout-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .container {
            max-width: 1400px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .filters {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .filter-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .filter-item {
            flex: 1;
            min-width: 200px;
        }

        .filter-item label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        .filter-item input, .filter-item select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .btn-filter {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 24px;
            border-radius: 5px;
            cursor: pointer;
            height: 38px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .stat-card .number {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }

        .table-container {
            background: white;
            border-radius: 10px;
            overflow-x: auto;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #f8f9fa;
            color: #555;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
        }

        th:hover {
            background: #e9ecef;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .imagen-thumb {
            width: 50px;
            height: 50px;
            object-fit: cover;
            cursor: pointer;
            border-radius: 5px;
            margin: 2px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
        }

        .modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 90%;
            margin-top: 50px;
        }

        .close {
            position: absolute;
            right: 35px;
            top: 15px;
            color: white;
            font-size: 40px;
            cursor: pointer;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: #666;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge-aprobado {
            background: #d4edda;
            color: #155724;
        }

        .badge-rechazado {
            background: #f8d7da;
            color: #721c24;
        }

        .badge-pendiente {
            background: #fff3cd;
            color: #856404;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
            
            .filter-group {
                flex-direction: column;
            }
            
            th, td {
                font-size: 12px;
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Sistema de Ventas - Coordinadores</h1>
        <div class="user-info">
            <span id="userName"></span>
            <button class="logout-btn" onclick="cerrarSesion()">Cerrar Sesión</button>
        </div>
    </div>

    <div class="container">
        <div class="filters">
            <div class="filter-group">
                <div class="filter-item">
                    <label>Fecha desde</label>
                    <input type="date" id="fechaDesde">
                </div>
                <div class="filter-item">
                    <label>Fecha hasta</label>
                    <input type="date" id="fechaHasta">
                </div>
                <div class="filter-item">
                    <label>Gerente</label>
                    <select id="filterGerente">
                        <option value="">Todos</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>Estatus</label>
                    <select id="filterEstatus">
                        <option value="">Todos</option>
                        <option value="Aprobado">Aprobado</option>
                        <option value="Rechazado">Rechazado</option>
                        <option value="Pendiente">Pendiente</option>
                    </select>
                </div>
                <button class="btn-filter" onclick="cargarVentas()">Filtrar</button>
                <button class="btn-filter" onclick="exportarExcel()" style="background: #28a745;">Exportar Excel</button>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card" onclick="filtrarPorEstatus('')">
                <h3>Total Ventas</h3>
                <div class="number" id="totalVentas">0</div>
            </div>
            <div class="stat-card" onclick="filtrarPorEstatus('Aprobado')">
                <h3>Aprobadas</h3>
                <div class="number" id="totalAprobadas">0</div>
            </div>
            <div class="stat-card" onclick="filtrarPorEstatus('Rechazado')">
                <h3>Rechazadas</h3>
                <div class="number" id="totalRechazadas">0</div>
            </div>
            <div class="stat-card" onclick="filtrarPorEstatus('Pendiente')">
                <h3>Pendientes</h3>
                <div class="number" id="totalPendientes">0</div>
            </div>
        </div>

        <div class="table-container">
            <div id="loadingMessage" class="loading" style="display: none;">Cargando datos...</div>
            <table id="ventasTable" style="display: none;">
                <thead id="tableHeader">
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal para imágenes -->
    <div id="imageModal" class="modal">
        <span class="close">&times;</span>
        <img class="modal-content" id="modalImage">
    </div>

    <script>
        let coordinador = null;
        let todasLasVentas = [];
        let ventasFiltradasActuales = [];
        let gerentesUnicos = [];

        // Verificar autenticación al cargar
        document.addEventListener('DOMContentLoaded', () => {
            const coordinadorData = sessionStorage.getItem('coordinador');
            if (!coordinadorData) {
                window.location.href = 'index_coordinadores.html';
                return;
            }
            
            coordinador = JSON.parse(coordinadorData);
            document.getElementById('userName').textContent = `Bienvenido, ${coordinador.nombres}`;
            
            cargarVentas();
        });

        // Función para filtrar por estatus (desde tarjetas)
        function filtrarPorEstatus(estatus) {
            document.getElementById('filterEstatus').value = estatus;
            cargarVentas();
        }

        // Cargar ventas desde el Apps Script
        function cargarVentas() {
            const loadingDiv = document.getElementById('loadingMessage');
            const table = document.getElementById('ventasTable');
            
            loadingDiv.style.display = 'block';
            table.style.display = 'none';
            
            google.script.run
                .withSuccessHandler(function(result) {
                    if (result.exito) {
                        todasLasVentas = result.registros;
                        actualizarFiltrosYTabla();
                    } else {
                        console.error('Error:', result.error);
                        document.getElementById('tableBody').innerHTML = `<tr><td colspan="20" style="text-align: center; color: red;">Error: ${result.error}</td></tr>`;
                        table.style.display = 'table';
                    }
                    loadingDiv.style.display = 'none';
                })
                .withFailureHandler(function(error) {
                    loadingDiv.style.display = 'none';
                    document.getElementById('tableBody').innerHTML = `<tr><td colspan="20" style="text-align: center; color: red;">Error al cargar datos: ${error.message}</td></tr>`;
                    table.style.display = 'table';
                })
                .obtenerVentasPorCoordinador(coordinador.codigo);
        }

        function actualizarFiltrosYTabla() {
            // Aplicar filtros
            const fechaDesde = document.getElementById('fechaDesde').value;
            const fechaHasta = document.getElementById('fechaHasta').value;
            const filterGerente = document.getElementById('filterGerente').value;
            const filterEstatus = document.getElementById('filterEstatus').value;
            
            ventasFiltradasActuales = todasLasVentas.filter(venta => {
                if (fechaDesde && venta['FECHA VALIDACIÓN'] < fechaDesde) return false;
                if (fechaHasta && venta['FECHA VALIDACIÓN'] > fechaHasta) return false;
                if (filterGerente && venta['GERENTES'] !== filterGerente) return false;
                if (filterEstatus && venta['ESTATUS'] !== filterEstatus) return false;
                return true;
            });
            
            // Actualizar estadísticas
            actualizarEstadisticas(ventasFiltradasActuales);
            
            // Actualizar select de gerentes
            const gerentesSet = new Set();
            todasLasVentas.forEach(v => {
                if (v['GERENTES'] && v['GERENTES'].trim()) {
                    gerentesSet.add(v['GERENTES']);
                }
            });
            gerentesUnicos = Array.from(gerentesSet).sort();
            
            const selectGerente = document.getElementById('filterGerente');
            const valorActual = selectGerente.value;
            selectGerente.innerHTML = '<option value="">Todos</option>';
            gerentesUnicos.forEach(gerente => {
                const option = document.createElement('option');
                option.value = gerente;
                option.textContent = gerente;
                if (valorActual === gerente) option.selected = true;
                selectGerente.appendChild(option);
            });
            
            // Mostrar tabla
            mostrarTabla(ventasFiltradasActuales);
        }

        function actualizarEstadisticas(ventas) {
            const total = ventas.length;
            const aprobadas = ventas.filter(v => v['ESTATUS'] === 'Aprobado').length;
            const rechazadas = ventas.filter(v => v['ESTATUS'] === 'Rechazado').length;
            const pendientes = ventas.filter(v => v['ESTATUS'] === 'Pendiente' || !v['ESTATUS']).length;
            
            document.getElementById('totalVentas').textContent = total;
            document.getElementById('totalAprobadas').textContent = aprobadas;
            document.getElementById('totalRechazadas').textContent = rechazadas;
            document.getElementById('totalPendientes').textContent = pendientes;
        }

        function mostrarTabla(ventas) {
            const table = document.getElementById('ventasTable');
            const thead = document.getElementById('tableHeader');
            const tbody = document.getElementById('tableBody');
            
            if (ventas.length === 0) {
                tbody.innerHTML = '<tr><td colspan="20" style="text-align: center;">No hay ventas para mostrar</td></tr>';
                table.style.display = 'table';
                return;
            }
            
            // Definir columnas a mostrar
            const columnasMostrar = [
                'FECHA VALIDACIÓN', 'ESTATUS', 'TIPO DE VENTA', 'GERENTES', 
                'CLAVE DE PROMOTOR', 'NOMBRE DEL CLIENTE', 'CELULAR CLIENTE',
                'PAQUETE', 'VELOCIDAD', 'FECHA Y HORA REGISTRO'
            ];
            
            // Crear encabezados
            thead.innerHTML = '<tr>' + columnasMostrar.map(col => 
                `<th onclick="ordenarTabla('${col}')">${col} ⬍</th>`
            ).join('') + '<th>IMÁGENES</th></tr>';
            
            // Crear filas
            tbody.innerHTML = ventas.map(venta => {
                let row = '<tr>';
                columnasMostrar.forEach(col => {
                    let valor = venta[col] || '-';
                    if (col === 'ESTATUS') {
                        let clase = '';
                        if (valor === 'Aprobado') clase = 'badge-aprobado';
                        else if (valor === 'Rechazado') clase = 'badge-rechazado';
                        else clase = 'badge-pendiente';
                        row += `<td><span class="badge ${clase}">${valor}</span></td>`;
                    } else {
                        row += `<td>${valor}</td>`;
                    }
                });
                
                // Agregar miniaturas de imágenes
                row += '<td>';
                for (let i = 1; i <= 15; i++) {
                    const imgKey = `IMAGEN ${i}`;
                    if (venta[imgKey] && venta[imgKey].trim() !== '' && venta[imgKey] !== 'Error' && !venta[imgKey].startsWith('Error')) {
                        row += `<img src="${venta[imgKey]}" class="imagen-thumb" onclick="verImagen('${venta[imgKey]}')">`;
                    }
                }
                row += '</td></tr>';
                
                return row;
            }).join('');
            
            table.style.display = 'table';
        }

        // Ordenar tabla
        let ordenActual = { columna: '', ascendente: true };

        function ordenarTabla(columna) {
            if (ordenActual.columna === columna) {
                ordenActual.ascendente = !ordenActual.ascendente;
            } else {
                ordenActual.columna = columna;
                ordenActual.ascendente = true;
            }
            
            ventasFiltradasActuales.sort((a, b) => {
                let valA = a[columna] || '';
                let valB = b[columna] || '';
                
                if (typeof valA === 'string') valA = valA.toLowerCase();
                if (typeof valB === 'string') valB = valB.toLowerCase();
                
                if (valA < valB) return ordenActual.ascendente ? -1 : 1;
                if (valA > valB) return ordenActual.ascendente ? 1 : -1;
                return 0;
            });
            
            mostrarTabla(ventasFiltradasActuales);
        }

        // Ver imagen en modal
        function verImagen(url) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            modal.style.display = 'block';
            modalImg.src = url;
        }

        // Cerrar modal
        document.querySelector('.close').onclick = function() {
            document.getElementById('imageModal').style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('imageModal');
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }

        // Exportar a Excel
        function exportarExcel() {
            if (ventasFiltradasActuales.length === 0) {
                alert('No hay datos para exportar');
                return;
            }
            
            let csv = "FECHA VALIDACIÓN,ESTATUS,TIPO DE VENTA,GERENTES,CLAVE DE PROMOTOR,NOMBRE DEL CLIENTE,CELULAR CLIENTE,PAQUETE,VELOCIDAD,FECHA Y HORA REGISTRO\n";
            ventasFiltradasActuales.forEach(venta => {
                const fila = [
                    venta['FECHA VALIDACIÓN'] || '',
                    venta['ESTATUS'] || '',
                    venta['TIPO DE VENTA'] || '',
                    venta['GERENTES'] || '',
                    venta['CLAVE DE PROMOTOR'] || '',
                    venta['NOMBRE DEL CLIENTE'] || '',
                    venta['CELULAR CLIENTE'] || '',
                    venta['PAQUETE'] || '',
                    venta['VELOCIDAD'] || '',
                    venta['FECHA Y HORA REGISTRO'] || ''
                ].map(celda => `"${celda.replace(/"/g, '""')}"`).join(',');
                csv += fila + "\n";
            });
            
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.setAttribute('download', `ventas_coordinador_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function cerrarSesion() {
            sessionStorage.clear();
            window.location.href = 'index_coordinadores.html';
        }
    </script>
</body>
</html>
